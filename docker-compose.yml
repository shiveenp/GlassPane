services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: glasspane-postgres
    environment:
      POSTGRES_DB: glasspane
      POSTGRES_USER: glasspane
      POSTGRES_PASSWORD: glasspane123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U glasspane -d glasspane"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: glasspane-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-init:
    image: ollama/ollama
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull nomic-embed-text
        ollama pull llama3.2
    restart: "no"

volumes:
  postgres_data:
  ollama_data:
